<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寄宿舎カレンダー登録</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 20px;
    text-align: center;
}

h1 {
    font-size: 22px;
    margin-bottom: 20px;
}

.card {
    background: white;
    padding: 15px;
    margin: 15px auto;
    border-radius: 12px;
    max-width: 400px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

a.button {
    display: block;
    padding: 14px;
    margin: 10px 0;
    background: #007aff;
    color: white;
    text-decoration: none;
    border-radius: 10px;
    font-weight: bold;
}

a.button.green { background: #34c759; }
a.button.orange { background: #ff9500; }
a.button.gray { background: #555; }

small {
    color: #666;
}
</style>

</head>
<body>

<h1>📅 寄宿舎カレンダー登録</h1>

<div class="card">
    <h2>🔵 全体予定（ALL）</h2>
    <a class="button" href="https://calendar.google.com/calendar/u/0/r?cid=https://kishukusha.github.io/calendar/ALL_CALENDAR.ics">
        ワンタップで登録
    </a>
    <a class="button gray" href="https://kishukusha.github.io/calendar/ALL_CALENDAR.ics">
        直接ICSを開く
    </a>
</div>

<div class="card">
    <h2>🟡 日課（NIKKA）</h2>
    <a class="button green" href="https://calendar.google.com/calendar/u/0/r?cid=https://kishukusha.github.io/calendar/NIKKA_CALENDAR.ics">
        ワンタップで登録
    </a>
    <a class="button gray" href="https://kishukusha.github.io/calendar/NIKKA_CALENDAR.ics">
        直接ICSを開く
    </a>
</div>

<div class="card">
    <h2>🟠 週番（TOBAN）</h2>
    <a class="button orange" href="https://calendar.google.com/calendar/u/0/r?cid=https://kishukusha.github.io/calendar/TOBAN_CALENDAR.ics">
        ワンタップで登録
    </a>
    <a class="button gray" href="https://kishukusha.github.io/calendar/TOBAN_CALENDAR.ics">
        直接ICSを開く
    </a>
</div>

<br>
<small>※iPhoneはSafariで開いてください</small>

</body>
</html>
