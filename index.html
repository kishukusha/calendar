<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寄宿舎カレンダー登録</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #eef3ff, #ffffff);
    margin: 0;
    padding: 25px;
    text-align: center;
}

h1 {
    font-size: 22px;
    margin-bottom: 10px;
}

.subtitle {
    font-size: 13px;
    color: #666;
    margin-bottom: 25px;
}

.card {
    background: white;
    padding: 18px;
    margin: 14px auto;
    border-radius: 16px;
    max-width: 420px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

h2 {
    font-size: 18px;
    margin-bottom: 12px;
}

a.button {
    display: block;
    padding: 16px;
    margin: 10px 0;
    background: #007aff;
    color: white;
    text-decoration: none;
    border-radius: 12px;
    font-weight: bold;
    font-size: 15px;
}

a.button.green { background: #34c759; }
a.button.orange { background: #ff9500; }
a.button.blue { background: #007aff; }

small {
    color: #777;
}
</style>

</head>
<body>

<h1>📅 寄宿舎カレンダー</h1>
<div class="subtitle">タップするだけで登録できます</div>

<!-- 日課 -->
<div class="card">
    <h2>🟡 日課</h2>
    <a class="button green"
       href="https://calendar.google.com/calendar/u/0/r?cid=https://kishukusha.github.io/calendar/NIKKA_CALENDAR.ics">
        ワンタップで登録
    </a>
</div>

<!-- 週番 -->
<div class="card">
    <h2>🟠 週番</h2>
    <a class="button orange"
       href="https://calendar.google.com/calendar/u/0/r?cid=https://kishukusha.github.io/calendar/TOBAN_CALENDAR.ics">
        ワンタップで登録
    </a>
</div>

<!-- 全体 -->
<div class="card">
    <h2>🔵 全体予定</h2>
    <a class="button blue"
       href="https://calendar.google.com/calendar/u/0/r?cid=https://kishukusha.github.io/calendar/ALL_CALENDAR.ics">
        ワンタップで登録
    </a>
</div>

</body>
</html>
