<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寄宿舎カレンダー登録</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #eef3ff, #ffffff);
    text-align: center;
    padding: 25px;
}

h1 { font-size: 22px; margin-bottom: 20px; }

.card {
    background: white;
    padding: 18px;
    margin: 14px auto;
    border-radius: 16px;
    max-width: 420px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

a.button {
    display: block;
    padding: 16px;
    margin: 10px 0;
    background: #007aff;
    color: white;
    text-decoration: none;
    border-radius: 12px;
    font-weight: bold;
}

.green { background: #34c759; }
.orange { background: #ff9500; }
.blue { background: #007aff; }
</style>

</head>
<body>

<h1>📅 寄宿舎カレンダー</h1>

<div class="card">
    <h2>🟡 日課</h2>
    <a class="button green"
       href="https://kishukusha.github.io/calendar/NIKKA_CALENDAR.ics">
        ワンタップで登録
    </a>
</div>

<div class="card">
    <h2>🟠 週番</h2>
    <a class="button orange"
       href="https://kishukusha.github.io/calendar/TOBAN_CALENDAR.ics">
        ワンタップで登録
    </a>
</div>

<div class="card">
    <h2>🔵 全体</h2>
    <a class="button blue"
       href="https://kishukusha.github.io/calendar/ALL_CALENDAR.ics">
        ワンタップで登録
    </a>
</div>

</body>
</html>
